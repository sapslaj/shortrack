---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: shortrack
provisioner: shortrack.sapslaj.xyz
parameters:
  poolName: k8s-test
  serverAddr: nas.example.com:29581
  targetPortal: nas.example.com:3260
  fsType: ext4
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-shortrack
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: shortrack
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-shortrack
  labels:
    app: test-shortrack
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: test-shortrack
  template:
    metadata:
      labels:
        app: test-shortrack
    spec:
      containers:
        - name: test
          image: debian:latest
          command:
            - /bin/sh
            - -c
            - while :; do sleep 3600; done
          volumeMounts:
            - name: test-shortrack
              mountPath: /test
      volumes:
        - name: test-shortrack
          persistentVolumeClaim:
            claimName: test-shortrack
